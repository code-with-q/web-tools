<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PNG / JPG → ICO Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-1: #0a0a1a;
    --bg-2: #1a1a3a;
    --card: #1e1e32;
    --card-2: #25253d;
    --border: #3a3a5a;
    --border-hover: #6366f1;
    --text: #e4e4e7;
    --text-dim: #9ca3af;
    --text-muted: #6b7280;
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --accent-3: #06b6d4;
    --danger: #ef4444;
    --success: #10b981;
    --checker-1: #2a2a42;
    --checker-2: #33334d;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at 20% 0%, rgba(99,102,241,0.15), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(168,85,247,0.12), transparent 50%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 32px);
    color: var(--text);
    line-height: 1.5;
  }

  .container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.03) inset;
    padding: clamp(20px, 4vw, 36px);
    width: 100%;
    max-width: 820px;
    backdrop-filter: blur(10px);
  }

  h1 {
    text-align: center;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: clamp(16px, 3vw, 24px);
    font-size: clamp(12px, 2vw, 14px);
  }

  /* ---------- Drop Zone ---------- */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: clamp(24px, 5vw, 40px) 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--card-2);
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 0;
  }
  .drop-zone > * { position: relative; z-index: 1; }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent-1);
    transform: translateY(-2px);
  }
  .drop-zone.dragover::before { opacity: 0.08; }
  .drop-zone p { color: var(--text); margin-bottom: 6px; font-size: clamp(13px, 2.5vw, 15px); }
  .drop-zone .hint { color: var(--text-muted); font-size: clamp(11px, 2vw, 12px); }
  .drop-zone input { display: none; }
  .drop-icon {
    font-size: clamp(32px, 6vw, 44px);
    margin-bottom: 8px;
    display: block;
  }

  /* ---------- Controls ---------- */
  .controls {
    margin-top: clamp(16px, 3vw, 24px);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }
  .controls > label {
    font-weight: 600;
    color: var(--text-dim);
    font-size: 14px;
  }
  .size-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .size-options input[type="radio"] { display: none; }
  .size-options label {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    font-size: 13px;
    transition: all 0.2s;
    background: var(--card-2);
    color: var(--text-dim);
    min-height: 40px;
    display: inline-flex;
    align-items: center;
  }
  .size-options label:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .size-options input[type="radio"]:checked + label {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(99,102,241,0.35);
  }

  /* ---------- Custom size ---------- */
  .custom-size {
    margin-top: 12px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 14px;
    background: var(--card-2);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .custom-size.active { display: flex; }
  .custom-size input[type="number"] {
    width: 90px;
    padding: 8px 12px;
    background: var(--bg-1);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
    font-weight: 600;
  }
  .custom-size input[type="number"]:focus {
    outline: none;
    border-color: var(--accent-1);
  }
  .custom-size input[type="range"] {
    flex: 1;
    min-width: 140px;
    max-width: 260px;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .custom-size input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(99,102,241,0.5);
  }
  .custom-size input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .custom-size .range-label {
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ---------- Previews ---------- */
  .previews {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: clamp(12px, 2vw, 20px);
    margin-top: clamp(16px, 3vw, 24px);
  }
  .preview-box {
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: clamp(12px, 2vw, 16px);
    text-align: center;
  }
  .preview-box h3 {
    color: var(--text-dim);
    margin-bottom: 12px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .preview-box .canvas-wrap {
    background:
      linear-gradient(45deg, var(--checker-1) 25%, transparent 25%),
      linear-gradient(-45deg, var(--checker-1) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--checker-1) 75%),
      linear-gradient(-45deg, transparent 75%, var(--checker-1) 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: var(--checker-2);
    border-radius: 10px;
    padding: 14px;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-box img, .preview-box canvas {
    max-width: 100%;
    max-height: 160px;
    image-rendering: pixelated;
  }
  .placeholder {
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ---------- Actions ---------- */
  .actions {
    margin-top: clamp(16px, 3vw, 24px);
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.35);
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(168,85,247,0.45);
  }
  .btn-secondary {
    background: var(--card-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) {
    background: var(--border);
    color: var(--text);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    margin-top: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 18px;
  }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }

  /* ---------- Mobile tweaks ---------- */
  @media (max-width: 520px) {
    .size-options label { padding: 8px 10px; font-size: 12px; }
    .previews { grid-template-columns: 1fr; }
    button { width: 100%; justify-content: center; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Image → ICO Converter</h1>
    <p class="subtitle">Convert PNG / JPG / JPEG files into Windows ICO icons</p>

    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">⬆️</span>
      <p><strong>Drag &amp; drop</strong> your image here</p>
      <p class="hint">or click to browse (PNG, JPG, JPEG)</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" />
    </div>

    <div class="controls">
      <label>Output size:</label>
      <div class="size-options" id="sizeOptions">
        <input type="radio" name="size" id="s16" value="16" />
        <label for="s16">16×16</label>
        <input type="radio" name="size" id="s32" value="32" checked />
        <label for="s32">32×32</label>
        <input type="radio" name="size" id="s64" value="64" />
        <label for="s64">64×64</label>
        <input type="radio" name="size" id="s128" value="128" />
        <label for="s128">128×128</label>
        <input type="radio" name="size" id="sCustom" value="custom" />
        <label for="sCustom">Custom</label>
      </div>
    </div>

    <div class="custom-size" id="customSize">
      <span class="range-label">8</span>
      <input type="range" id="sizeRange" min="8" max="512" step="1" value="48" />
      <input type="number" id="sizeNumber" min="8" max="512" step="1" value="48" />
      <span class="range-label">px · max 512</span>
    </div>

    <div class="previews">
      <div class="preview-box">
        <h3>Original</h3>
        <div class="canvas-wrap" id="origWrap">
          <span class="placeholder">No image loaded</span>
        </div>
      </div>
      <div class="preview-box">
        <h3>Converted Icon</h3>
        <div class="canvas-wrap" id="convWrap">
          <span class="placeholder">—</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="resetBtn" disabled>↺ Reset</button>
      <button class="btn-primary" id="downloadBtn" disabled>⬇ Download ICO</button>
    </div>

    <div class="status" id="status"></div>
  </div>

<script>
(() => {
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const origWrap    = document.getElementById('origWrap');
  const convWrap    = document.getElementById('convWrap');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const statusEl    = document.getElementById('status');
  const sizeInputs  = document.querySelectorAll('input[name="size"]');
  const customPanel = document.getElementById('customSize');
  const sizeRange   = document.getElementById('sizeRange');
  const sizeNumber  = document.getElementById('sizeNumber');

  let sourceImage = null;
  let sourceName  = '';
  let currentIcoBlob = null;

  /* ---------- Drag & Drop ---------- */
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  ['dragenter','dragover'].forEach(ev =>
    dropZone.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.add('dragover');
    })
  );
  ['dragleave','drop'].forEach(ev =>
    dropZone.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.remove('dragover');
    })
  );
  dropZone.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });

  /* ---------- File handling ---------- */
  function handleFile(file) {
    if (!file) return;
    if (!/^image\/(png|jpeg|jpg)$/.test(file.type)) {
      setStatus('❌ Unsupported file type. Please use PNG or JPG.', 'error');
      return;
    }
    sourceName = file.name.replace(/\.[^.]+$/, '');
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        sourceImage = img;
        showOriginal(img);
        convert();
        resetBtn.disabled = false;
        setStatus(`✔ Loaded: ${file.name} (${img.width}×${img.height})`, 'success');
      };
      img.onerror = () => setStatus('❌ Failed to decode image.', 'error');
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showOriginal(img) {
    origWrap.innerHTML = '';
    const el = img.cloneNode();
    origWrap.appendChild(el);
  }

  /* ---------- Size selection ---------- */
  function getSelectedSize() {
    const checked = document.querySelector('input[name="size"]:checked');
    if (checked.value === 'custom') {
      let v = parseInt(sizeNumber.value, 10);
      if (isNaN(v)) v = 48;
      v = Math.max(8, Math.min(512, v));
      return v;
    }
    return parseInt(checked.value, 10);
  }

  sizeInputs.forEach(r => r.addEventListener('change', () => {
    if (r.value === 'custom') {
      customPanel.classList.add('active');
    } else {
      customPanel.classList.remove('active');
    }
    convert();
  }));

  sizeRange.addEventListener('input', () => {
    sizeNumber.value = sizeRange.value;
    convert();
  });
  sizeNumber.addEventListener('input', () => {
    let v = parseInt(sizeNumber.value, 10);
    if (!isNaN(v)) sizeRange.value = v;
    convert();
  });
  sizeNumber.addEventListener('blur', () => {
    let v = parseInt(sizeNumber.value, 10);
    if (isNaN(v)) v = 48;
    v = Math.max(8, Math.min(512, v));
    sizeNumber.value = v;
    sizeRange.value = v;
    convert();
  });

  /* ---------- Conversion ---------- */
  function convert() {
    if (!sourceImage) return;
    const size = getSelectedSize();

    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);

    const sw = sourceImage.width, sh = sourceImage.height;
    const scale = Math.min(size / sw, size / sh);
    const dw = sw * scale, dh = sh * scale;
    const dx = (size - dw) / 2, dy = (size - dh) / 2;
    ctx.drawImage(sourceImage, dx, dy, dw, dh);

    // Preview
    convWrap.innerHTML = '';
    const preview = document.createElement('canvas');
    preview.width = size; preview.height = size;
    preview.getContext('2d').drawImage(canvas, 0, 0);
    const displaySize = Math.min(size * 2, 160);
    preview.style.width  = displaySize + 'px';
    preview.style.height = displaySize + 'px';
    convWrap.appendChild(preview);

    buildIco(canvas, size).then(blob => {
      currentIcoBlob = blob;
      downloadBtn.disabled = false;
      setStatus(`✔ Ready — ${size}×${size} icon (${(blob.size/1024).toFixed(1)} KB)`, 'success');
    });
  }

  /* ---------- ICO builder (PNG-compressed ICO) ---------- */
  async function buildIco(canvas, size) {
    const pngBlob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const pngBuf  = new Uint8Array(await pngBlob.arrayBuffer());

    const headerSize = 6 + 16;
    const buf = new ArrayBuffer(headerSize + pngBuf.length);
    const view = new DataView(buf, 0);
    const bytes = new Uint8Array(buf);

    view.setUint16(0, 0, true);
    view.setUint16(2, 1, true);
    view.setUint16(4, 1, true);

    const entry = 6;
    view.setUint8(entry + 0, size >= 256 ? 0 : size);
    view.setUint8(entry + 1, size >= 256 ? 0 : size);
    view.setUint8(entry + 2, 0);
    view.setUint8(entry + 3, 0);
    view.setUint16(entry + 4, 1, true);
    view.setUint16(entry + 6, 32, true);
    view.setUint32(entry + 8, pngBuf.length, true);
    view.setUint32(entry + 12, headerSize, true);

    bytes.set(pngBuf, headerSize);
    return new Blob([buf], { type: 'image/x-icon' });
  }

  /* ---------- Download ---------- */
  downloadBtn.addEventListener('click', () => {
    if (!currentIcoBlob) return;
    const url = URL.createObjectURL(currentIcoBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (sourceName || 'icon') + '.ico';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  /* ---------- Reset ---------- */
  resetBtn.addEventListener('click', () => {
    sourceImage = null; currentIcoBlob = null; sourceName = '';
    origWrap.innerHTML = '<span class="placeholder">No image loaded</span>';
    convWrap.innerHTML = '<span class="placeholder">—</span>';
    downloadBtn.disabled = true;
    resetBtn.disabled = true;
    fileInput.value = '';
    setStatus('');
  });

  function setStatus(msg, type) {
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }
})();
</script>
</body>
</html>
